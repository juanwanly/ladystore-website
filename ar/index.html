<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر ليدي</title>

    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #fafafa;
    direction:rtl;
}

nav {
    background: #111;
    padding: 15px;
    text-align: right;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

.hero {
     direction: rtl;
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                url("/images/perfume.jpg");
    background-size: cover;
    background-position: center;
    padding: 100px 20px;
    text-align: center;
    color: white;
}

.hero-content {
    max-width: 700px;
    margin: 0 auto;
}

.hero h1 {
    font-size: 42px;
    margin-bottom: 15px;
}

.hero p {
    font-size: 20px;
    margin-bottom: 25px;
}

.hero-btn {
    display: inline-block;
    background: white;
    color: #111;
    padding: 12px 24px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}

.hero-btn:hover {
    background: #f8cdda;
}

.products {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    width: 220px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
}

.card h3 {
    margin-top: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
}

.footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}
    </style>
</head>

<body>

<nav>
    <a href="/ar/">الرئيسية</a>
    <a href="/ar/produkte.html">المنتجات</a>
    <a href="/ar/kontakt.html">تواصل</a>
    <a href="/">English</a>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>مرحباً بكم في ليدي ستور بيوتي</h1>
        <p>اكتشفوا أجمل العطور ومستحضرات التجميل والحقائب الأنيقة</p>
        <a class="hero-btn" href="/ar/produkte.html">عرض المنتجات</a>
    </div>
</div>

<div class="products">

    <div class="card">
        <img src="/images/parfum1.jpg">
        <h3>عطر</h3>
    </div>

    <div class="card">
        <img src="/images/bag1.jpg">
        <h3>حقيبة</h3>
    </div>

</div>

<div class="footer">
    <p>تواصل معنا عبر واتساب</p>
</div>

</body>
</html>
