<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lady Store Damascus</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #fafafa;
}

nav {
    background: #111;
    padding: 15px;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

.hero {
    background: linear-gradient(to right, #f8cdda, #f9f9f9);
    padding: 60px;
    text-align: center;
}

.hero h1 {
    margin-bottom: 10px;
}

.products {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    width: 220px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card h3 {
    margin-top: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
}

.footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/produkte.html">Products</a>
    <a href="/kontakt.html">Contact</a>
    <a href="/ar/">العربية</a>
</nav>

<div class="hero">
    <h1>Lady Store Damascus 💄</h1>
    <p>Perfumes, cosmetics and fashion bags</p>
</div>

<div class="products">

    <div class="card">
        <img src="/images/perfume.jpg">
        <h3>Perfume</h3>
    </div>

    <div class="card">
        <img src="/images/bag.jpg">
        <h3>Bag</h3>
    </div>

</div>

<div class="footer">
    <p>Contact us via WhatsApp</p>
</div>

</body>
</html>
