<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lady Store Damascus</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #fafafa;
}

nav {
    background: #111;
    padding: 15px;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

.hero {
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                url("/images/perfume.jpg");
    background-size: cover;
    background-position: center;
    padding: 100px 20px;
    text-align: center;
    color: white;
}

.hero-content {
    max-width: 700px;
    margin: 0 auto;
}

.hero h1 {
    font-size: 42px;
    margin-bottom: 15px;
}

.hero p {
    font-size: 20px;
    margin-bottom: 25px;
}

.hero-btn {
    display: inline-block;
    background: white;
    color: #111;
    padding: 12px 24px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}

.hero-btn:hover {
    background: #f8cdda;
}

.products {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    width: 220px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card h3 {
    margin-top: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
}

.footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/produkte.html">Products</a>
    <a href="/kontakt.html">Contact</a>
    <a href="/ar/">العربية</a>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>Welcome to Lady Store Beauty</h1>
        <p>Discover premium perfumes, cosmetics and stylish bags</p>
        <a class="hero-btn" href="/produkte.html">View Products</a>
    </div>
</div>

<div class="products">

    <div class="card">
        <img src="/images/parfum1.jpg">
        <h3>Perfume</h3>
    </div>

    <div class="card">
        <img src="/images/bag1.jpg">
        <h3>Bag</h3>
    </div>

</div>

<div class="footer">
    <p>Contact us via WhatsApp</p>
</div>

</body>
</html>
